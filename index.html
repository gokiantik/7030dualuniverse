<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>70/30 Dual Universe - The Sovereign Blueprint by Go Kian Tik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #001220; color: #f1f5f9; }
        .bg-grid { background-image: radial-gradient(#3b82f6 1px, transparent 1px); background-size: 20px 20px; }
        .glass-effect { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(59, 130, 246, 0.3); border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [lang, setLang] = useState('id');
            const [showVault, setShowVault] = useState(false);

            const pillars = [
                { id: "Humanity", color: "border-red-500", title: { id: "1. Humanity", en: "1. Humanity" }, desc: { id: "Menghormati narasi hidup setiap individu sebagai 'Walking Books'.", en: "Honoring lived narratives as 'Walking Books'." } },
                { id: "Sovereignty", color: "border-amber-500", title: { id: "2. Sovereignty", en: "2. Sovereignty" }, desc: { id: "Memberdayakan manusia untuk merebut kembali kedaulatan diri (自主者).", en: "Empowering individuals to reclaim self-governance." } },
                { id: "Dignity", color: "border-blue-500", title: { id: "3. Dignity", en: "3. Dignity" }, desc: { id: "Teknologi memperlakukan manusia sebagai subjek sakral.", en: "Technology treating humans as sacred subjects." } },
                { id: "Family", color: "border-green-500", title: { id: "4. Family", en: "4. Family" }, desc: { id: "Melindungi akar koneksi dan membangun warisan digital aman.", en: "Protecting roots and building a safe digital legacy." } },
                { id: "Ubuntu", color: "border-purple-500", title: { id: "5. Ubuntu", en: "5. Ubuntu" }, desc: { id: "'I am because we are'—kebangkitan kolektif yang jitu.", en: "'I am because we are'—collective rise." } }
            ];

            return (
                <div className="min-h-screen p-4 md:p-8 flex flex-col items-center custom-scrollbar">
                    {/* Header */}
                    <header className="text-center mb-12">
                        <h1 className="text-4xl md:text-6xl font-bold bg-gradient-to-r from-blue-400 to-amber-500 bg-clip-text text-transparent mb-2 uppercase">70/30 Dual Universe</h1>
                        <p className="text-blue-300 text-xs tracking-widest">THE SOVEREIGN BLUEPRINT BY GO KIAN TIK</p>
                    </header>

                    {/* Main Content Grid */}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-6xl mb-12">
                        {/* 70% Digital Side */}
                        <div className="glass-effect rounded-3xl p-8 relative overflow-hidden group">
                            <div className="absolute top-0 left-0 w-full h-full opacity-10 bg-grid pointer-events-none"></div>
                            <span className="text-6xl font-black text-blue-500/20">70%</span>
                            <h2 className="text-2xl font-bold text-blue-400 mb-6 uppercase tracking-tight">Digital Universe</h2>
                            <p className="text-blue-100/70 italic text-lg border-l-4 border-blue-500/30 pl-4 mb-6">
                                "Kalkulasi secepat cahaya. Seribu tahun pengetahuan diringkas menjadi 60 menit. Orkestrasi dari para raksasa digital."
                            </p>
                            <div className="space-y-2 mb-6">
                                <a href="https://doi.org/10.5281/zenodo.18965525" target="_blank" className="block text-[11px] text-blue-300 underline hover:text-white transition-colors">Acknowledgment to AI Architects (DOI)</a>
                                <a href="https://doi.org/10.5281/zenodo.18961213" target="_blank" className="block text-[11px] text-blue-300 underline hover:text-white transition-colors">AHA Moment in the Unknown Arena (DOI)</a>
                            </div>
                        </div>

                        {/* 30% Material Side */}
                        <div className="glass-effect rounded-3xl p-8 border-amber-500/20">
                            <span className="text-6xl font-black text-amber-500/20">30%</span>
                            <h2 className="text-2xl font-bold text-amber-400 mb-6 uppercase tracking-tight">Material Universe</h2>
                            <ul className="space-y-4">
                                <li className="flex items-center gap-3 text-amber-100/80 font-medium"><span>☕</span> Sovereign's Coffee</li>
                                <li className="flex items-center gap-3 text-amber-100/80 font-medium">
                                    <span>🧘</span> 
                                    <a href="https://taotsm.org/mengenal-dao-yin-shu-%E5%B0%8E%E5%BC%95%E8%A1%93/" target="_blank" className="underline hover:text-amber-400">Dao Yin Shu</a>
                                </li>
                                <li className="flex items-center gap-3 text-amber-100/80 font-medium"><span>🛡️</span> Kesadaran Batin</li>
                            </ul>
                        </div>
                    </div>

                    {/* Manifesto Section */}
                    <section className="glass-effect rounded-3xl p-8 w-full max-w-6xl mb-12">
                        <div className="flex justify-center gap-4 mb-8">
                            <button onClick={() => setLang('id')} className={`px-4 py-1 rounded-full text-xs font-bold ${lang === 'id' ? 'bg-amber-500 text-slate-900' : 'bg-slate-800'}`}>ID</button>
                            <button onClick={() => setLang('en')} className={`px-4 py-1 rounded-full text-xs font-bold ${lang === 'en' ? 'bg-amber-500 text-slate-900' : 'bg-slate-800'}`}>EN</button>
                        </div>
                        <h2 className="text-3xl font-bold text-center mb-10 text-white">{lang === 'id' ? 'Manifesto Kedaulatan' : 'Sovereign Manifesto'}</h2>
                        <div className="grid grid-cols-1 md:grid-cols-5 gap-4 text-center">
                            {pillars.map(p => (
                                <div key={p.id} className={`p-4 rounded-xl bg-slate-900/40 border-t-4 ${p.color}`}>
                                    <h3 className="font-bold text-sm text-white mb-2">{lang === 'id' ? p.title.id : p.title.en}</h3>
                                    <p className="text-[10px] text-slate-400 leading-relaxed">{lang === 'id' ? p.desc.id : p.desc.en}</p>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* Footer */}
                    <footer className="text-center pb-12">
                        <div className="px-6 py-2 border border-slate-700 rounded-full mb-4 text-amber-400 font-bold text-xs uppercase tracking-widest">Bejo: Readiness meet Momentum</div>
                        <p className="text-[10px] text-slate-600 uppercase">© 2026 Mbah Hogi Bejo • Chief Humanity Officer</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
