    <script type="text/babel">
        const { useState } = React;

        const CpuIcon = ({ className }) => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect>
                <rect x="9" y="9" width="6" height="6"></rect>

        );

        const FlowerIcon = ({ className }) => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M12 7.5V2"></path><path d="M12 22v-5.5"></path>
                <path d="m17 12 5.5-2"></path><path d="m1.5 14 5.5-2"></path>
                <circle cx="12" cy="12" r="3"></circle><circle cx="12" cy="15" r="3"></circle>
                <circle cx="15" cy="12" r="3"></circle><circle cx="9" cy="12" r="3"></circle>
            </svg>
        );

        const TerminalIcon = ({ className }) => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <polyline points="4 17 10 11 4 5"></polyline>
                <line x1="12" y1="19" x2="20" y2="19"></line>
            </svg>
        );

        const App = () => {
            const [activeSide, setActiveSide] = useState(null);
            const [showVault, setShowVault] = useState(false);
            const [copiedIndex, setCopiedIndex] = useState(null);

            const learningVault = [
                { title: "1. The 80/20 Shortcut", prompt: "Saya ingin belajar [topik] dalam 20 jam. Buatkan rencana yang fokus hanya pada 20% hal terpenting. Bagi menjadi 10 blok waktu masing-masing 2 jam. Setiap blok harus berisi: apa yang harus dipelajari, satu sumber daya utama, dan cek pemahaman 15 menit di akhir." },
                { title: "2. The One-Pager", prompt: "Ringkas [topik] menjadi satu halaman yang bisa saya tinjau dalam 5 menit. Sertakan: konsep inti, bagaimana keterkaitannya, kesalahan umum pemula, dan satu contoh nyata untuk masing-masing. Buat ringkasan yang layak saya tempel di dinding kerja saya." },
                { title: "3. Teach Me Like I'm 12", prompt: "Jelaskan [topik] menggunakan kata-kata yang dipahami anak usia 12 tahun. Jangan gunakan jargon. Gunakan analogi dan perbandingan dari kehidupan sehari-hari. Akhiri dengan 3 pertanyaan untuk menguji apakah saya benar-benar paham." },
                { title: "4. The Skill Ladder", prompt: "Petakan [topik] menjadi 5 tingkat kemahiran yang jelas. Untuk setiap tingkat beritahu saya: apa yang bisa saya lakukan, apa yang harus dipelajari, berapa lama waktunya, dan bagaimana saya tahu saya siap untuk naik ke tingkat berikutnya." },
                { title: "5. Beginner Traps to Skip", prompt: "Apa hal-hal yang biasanya membuang-buang waktu orang saat mempelajari [topik]? Berikan saya 5 jebakan terbesar bagi pemula, mengapa itu terjadi, dan apa yang harus dilakukan sebagai gantinya untuk menghemat waktu berminggu-minggu." }
            ];

            const copyToClipboard = (text, index) => {
                const el = document.createElement('textarea');
                el.value = text;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                setCopiedIndex(index);
                setTimeout(() => setCopiedIndex(null), 2000);
            };

            return (
                <div className="min-h-screen text-slate-100 flex flex-col items-center justify-center p-4 overflow-hidden relative">
                    <div className="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none">
                        <div className="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-blue-900/10 blur-[120px] rounded-full" />
                        <div className="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-amber-900/10 blur-[120px] rounded-full" />

                                ${activeSide === 'digital' ? 'border-blue-500/40 bg-blue-950/20' : ''}`}

                            onMouseLeave={() => setActiveSide(null)}
                        >
                            <div className="absolute top-0 left-0 w-full h-full opacity-[0.03] pointer-events-none bg-grid" />
                            <div className="flex justify-between items-start mb-6">
                                <div>
                                    <div className="text-blue-500 font-bold tracking-tighter text-sm mb-1 uppercase">Dimensi A</div>
                                    <span className="text-7xl font-black text-blue-500/10">70%</span>
                                    <h2 className="text-4xl font-bold text-blue-400 mt-2">DIGITAL UNIVERSE</h2>
                                </div>
                                <CpuIcon className={`w-12 h-12 text-blue-400/50 transition-transform duration-700 ${activeSide === 'digital' ? 'rotate-180 text-blue-400' : ''}`} />
                            </div>

                            <div className="flex-grow flex flex-col justify-center">

                                        <div className="flex items-center gap-2">
                                            <TerminalIcon className="w-5 h-5 text-blue-400" />
                                            <span className="text-blue-200 font-bold uppercase tracking-wider text-sm">AI Vault (80/20 Shortcut)</span>
                                        </div>

                                            onClick={() => setShowVault(!showVault)}
                                            className="px-3 py-1 bg-blue-500/20 hover:bg-blue-500/40 border border-blue-400/30 rounded-full text-[10px] font-bold uppercase tracking-widest transition-all"
                                        >
                                            {showVault ? 'Tutup Vault' : 'Buka Vault'}
                                        </button>
                                    </div>

                                    {showVault ? (
                                        <div className="space-y-3 max-h-[250px] overflow-y-auto pr-2 custom-scrollbar">
                                            {learningVault.map((p, i) => (
                                                <div 
                                                    key={i} 
                                                    onClick={() => copyToClipboard(p.prompt, i)}
                                                    className="prompt-card p-4 rounded-xl cursor-pointer relative group/card"
                                                >
                                                    <div className="text-xs font-bold text-blue-400 mb-1">{p.title}</div>
                                                    <p className="text-[11px] text-blue-100/60 line-clamp-2 leading-relaxed">{p.prompt}</p>
                                                    <div className="absolute right-4 top-1/2 -translate-y-1/2 opacity-0 group-hover/card:opacity-100 transition-opacity">
                                                        <span className="text-[10px] bg-blue-500/40 px-2 py-1 rounded-md text-white font-bold">
                                                            {copiedIndex === i ? 'TERSALIN!' : 'SALIN'}
                                                        </span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    ) : (
                                        <div className="py-4">
                                            <p className="text-blue-100/70 italic text-xl leading-relaxed border-l-4 border-blue-500/30 pl-6">
                                                "Kalkulasi secepat cahaya. Seribu tahun pengetahuan diringkas menjadi 60 menit."
                                            </p>
                                        </div>
                                    )}
                                </div>
                            </div>

                            <div className="grid grid-cols-4 md:grid-cols-8 gap-2 mt-8">
                                {['Gemini', 'Claude', 'GPT', 'Lyria', 'DeepSeek', 'Copilot', 'Veo', 'Nano'].map((ai) => (
                                    <div key={ai} className="py-1 px-2 text-center rounded-md bg-blue-500/5 border border-blue-500/10 text-[9px] font-mono text-blue-400 uppercase tracking-tighter">
                                        {ai}
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div 
                            className={`col-span-1 md:col-span-4 rounded-[2rem] p-8 transition-all duration-700 glass-effect flex flex-col justify-between relative overflow-hidden
                                ${activeSide === 'material' ? 'border-amber-500/40 bg-amber-950/10' : ''}`}
                            onMouseEnter={() => setActiveSide('material')}
                            onMouseLeave={() => setActiveSide(null)}
                        >
                            <div className="flex justify-between items-start">
                                <div>
                                    <div className="text-amber-500 font-bold tracking-tighter text-sm mb-1 uppercase">Dimensi B</div>
                                    <span className="text-7xl font-black text-amber-500/10">30%</span>
                                    <h2 className="text-3xl font-bold text-amber-400 mt-2 leading-tight uppercase">Material<br/>Universe</h2>
                                </div>
                                <FlowerIcon className={`w-12 h-12 text-amber-400/50 transition-transform duration-700 ${activeSide === 'material' ? 'scale-110 text-amber-400' : ''}`} />
                            </div>
                            <div className="space-y-6 my-10">
                                <div className="flex items-center gap-4 text-amber-200/90 group/item">
                                    <div className="w-10 h-10 rounded-full bg-amber-500/10 flex items-center justify-center font-bold text-lg">☕</div>
                                    <span className="font-medium text-sm tracking-wide">Sovereign's Coffee</span>
                                </div>
                                <div className="flex items-center gap-4 text-amber-200/90 group/item">
                                    <div className="w-10 h-10 rounded-full bg-amber-500/10 flex items-center justify-center font-bold text-lg">🧘</div>
                                    <span className="font-medium text-sm tracking-wide">Dao Yin Shu</span>
                                </div>
                                <div className="flex items-center gap-4 text-amber-200/90 group/item">
                                    <div className="w-10 h-10 rounded-full bg-amber-500/10 flex items-center justify-center font-bold text-lg">🛡️</div>
                                    <span className="font-medium text-sm tracking-wide">Kesadaran Batin</span>
                                </div>
                            </div>
                            <div className="mt-4 bg-amber-500/5 p-4 rounded-2xl border border-amber-500/10 text-center">
                                <p className="text-amber-100/70 italic text-xs leading-relaxed">
                                    "Jangkar bagi jiwa. <br/>Yan Xing Duan Zheng.<br/>Yi ban you wo, yi ban you tian."
                                </p>
                            </div>
                        </div>
                    </div>
<section id="sovereign-manifesto" style="padding: 80px 20px; background: linear-gradient(180deg, #ffffff 0%, #f4f7f6 100%); border-top: 1px solid #eee;">
    <div style="max-width: 1000px; margin: 0 auto; text-align: center;">
        
        <div style="margin-bottom: 30px; display: flex; justify-content: center; gap: 10px;">
            <button onclick="setLanguage('id')" id="btn-id" style="padding: 10px 20px; border: 2px solid #2c3e50; border-radius: 30px; background: #2c3e50; color: white; cursor: pointer; font-weight: bold; transition: 0.3s;">Bahasa Indonesia</button>
            <button onclick="setLanguage('en')" id="btn-en" style="padding: 10px 20px; border: 2px solid #2c3e50; border-radius: 30px; background: white; color: #2c3e50; cursor: pointer; font-weight: bold; transition: 0.3s;">English</button>
        </div>

        <div class="lang-id">
            <h2 style="color: #2c3e50; font-size: 2.5rem; margin-bottom: 10px;">Manifesto Kedaulatan</h2>
            <p style="color: #16a085; font-size: 1.2rem; font-weight: 500;">Lima Pilar AI yang Memanusiakan dalam Ekosistem 70/30</p>
        </div>
        <div class="lang-en" style="display: none;">
            <h2 style="color: #2c3e50; font-size: 2.5rem; margin-bottom: 10px;">The Sovereign Manifesto</h2>
            <p style="color: #16a085; font-size: 1.2rem; font-weight: 500;">Five Pillars of Human-Centric AI in the 70/30 Ecosystem</p>
        </div>

        <div style="margin: 40px 0;">
            <img src="path/ke/gambar/mandala_koko.jpg" alt="The Sovereign Mandala" style="width: 100%; max-width: 600px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.1);">
        </div>

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; text-align: left; margin-top: 50px;">
            
            <div style="padding: 25px; background: white; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); border-top: 5px solid #e74c3c;">
                <h3 style="color: #e74c3c;">1. Humanity</h3>
                <p class="lang-id">Menghormati narasi hidup dan kebenaran emosional setiap individu sebagai "Walking Books".</p>
                <p class="lang-en" style="display: none;">Honoring lived narratives and emotional truths as "Walking Books".</p>
            </div>

            <div style="padding: 25px; background: white; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); border-top: 5px solid #f39c12;">
                <h3 style="color: #f39c12;">2. Sovereignty</h3>
                <p class="lang-id">Memberdayakan manusia untuk bangkit dan merebut kembali kedaulatan diri (自主者).</p>
                <p class="lang-en" style="display: none;">Empowering individuals to rise and reclaim their self-governance (自主者).</p>
            </div>

            <div style="padding: 25px; background: white; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); border-top: 5px solid #3498db;">
                <h3 style="color: #3498db;">3. Dignity</h3>
                <p class="lang-id">Teknologi memperlakukan manusia sebagai subjek sakral, bukan titik data.</p>
                <p class="lang-en" style="display: none;">Technology treating humans as sacred subjects, never mere data points.</p>
            </div>

            <div style="padding: 25px; background: white; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); border-top: 5px solid #27ae60;">
                <h3 style="color: #27ae60;">4. Family</h3>
                <p class="lang-id">Melindungi akar koneksi dan membangun warisan digital yang aman.</p>
                <p class="lang-en" style="display: none;">Protecting human roots and building a safe digital legacy.</p>
            </div>

            <div style="padding: 25px; background: white; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); border-top: 5px solid #8e44ad;">
                <h3 style="color: #8e44ad;">5. Ubuntu</h3>
                <p class="lang-id">"I am because we are"—kebangkitan kolektif adalah jalan yang paling jitu.</p>
                <p class="lang-en" style="display: none;">"I am because we are"—collective rise is the most effective path.</p>
            </div>

        </div>
    </div>
</section>

<script>
function setLanguage(lang) {
    const idEl = document.querySelectorAll('.lang-id');
    const enEl = document.querySelectorAll('.lang-en');
    const bId = document.getElementById('btn-id');
    const bEn = document.getElementById('btn-en');

    if (lang === 'en') {
        idEl.forEach(e => e.style.display = 'none');
        enEl.forEach(e => e.style.display = 'block');
        bEn.style.background = '#2c3e50'; bEn.style.color = 'white';
        bId.style.background = 'white'; bId.style.color = '#2c3e50';
    } else {
        idEl.forEach(e => e.style.display = 'block');
        enEl.forEach(e => e.style.display = 'none');
        bId.style.background = '#2c3e50'; bId.style.color = 'white';
        bEn.style.background = 'white'; bEn.style.color = '#2c3e50';
    }
}
</script>
                    <footer className="z-10 mt-12 text-center max-w-3xl">
                        <div className="inline-block px-8 py-3 rounded-full border border-slate-700 bg-slate-900/80 mb-6 shadow-xl shadow-blue-900/10 hover:border-amber-500/50 transition-colors cursor-pointer group">
                            <span className="text-amber-400 font-bold tracking-[0.3em] text-xs md:text-sm group-hover:text-amber-300 uppercase">Bejo: Readiness meet Momentum</span>
                        </div>
                        <p className="text-slate-500 text-[10px] md:text-xs leading-relaxed max-w-lg mx-auto uppercase tracking-widest opacity-60">
                            Arsitektur Otonom oleh Go Kian Tik (自主者). 
                            <br/>© 2026 Mbah Hogi Bejo • Chief Humanity Officer
                        </p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
